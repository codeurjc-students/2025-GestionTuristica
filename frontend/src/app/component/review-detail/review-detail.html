<h1>Detalle de la reseña</h1>
<p>Reserva: {{review.reservationIdentifier}}</p>
<p>Habitación: {{review.roomName}}</p>
<p>Hora de creación: {{review.creationTime}}</p>

<p>Mensaje: {{review.message}}</p>
<p>Puntuación: {{review.rating}}</p>

<button matButton="outlined" (click)="deleteReview()">Eliminar reseña</button>
<button matButton="outlined" (click)="updateReview()">Editar reseña</button>

<button matButton="outlined" (click)="cancel()">Volver atrás</button>
