<form (ngSubmit)="createReview()" #f="ngForm" class="review-form">
    <div>
        <label>
            Mensaje
            <textarea name="message" [(ngModel)]="message" required></textarea>
        </label>
    </div>

    <div>
        <label>
            Valoración
            <input type="number" name="rating" [(ngModel)]="rating" min="1" max="5" step="0.5" required>
        </label>
    </div>

    <button type="submit"> Crear reseña</button>
    <button (click)="cancel()">Cancelar</button>
</form>
