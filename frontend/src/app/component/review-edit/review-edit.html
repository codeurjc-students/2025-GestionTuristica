<form (ngSubmit)="updateReview()" #f="ngForm" class="review-form">
    <div>
        <label>
            Mensaje
            <input name="message" [(ngModel)]="review.message" required/>
        </label>
    </div>

    <div>
        <label>
            Valoración
            <input type="number" name="rating" [(ngModel)]="review.rating" min="1" max="5" step="0.5" required>
        </label>
    </div>

    <button type="submit"> Guardar cambios</button>
    <button (click)="cancelEdit()">Cancelar</button>
</form>
